<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务状态</title>
    <style>
        :root {
            --card-bg: #ffffff;
            --text: #1e293b;
            --sub: #64748b;
            --border: #e2e8f0;
            --shadow: 0 1px 3px rgba(0,0,0,0.04);
            --online: #10b981;
            --redirect: #f59e0b;
            --overload: #ef4444;
            --offline: #ef4444;
            --unknown: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #f8fafc;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            padding: 2rem 1rem;
            color: var(--text);
        }

        .container { max-width: 720px; width: 100%; }

        h1 {
            font-weight: 600;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: #0f172a;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1rem;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .card-header { display: flex; align-items: center; gap: 0.5rem; }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--unknown);
            flex-shrink: 0;
        }

        .dot.online  { background: var(--online); }
        .dot.redirect { background: var(--redirect); }
        .dot.overload { background: var(--overload); }
        .dot.offline  { background: var(--offline); }

        .name { font-weight: 500; word-break: break-word; }

        .status-text { font-size: 0.85rem; font-weight: 500; }
        .status-text.normal { color: var(--online); }
        .status-text.warning { color: var(--redirect); }
        .status-text.error { color: var(--offline); }
        .status-text.unknown { color: var(--unknown); }

        .time { font-size: 0.75rem; color: var(--sub); margin-top: auto; }

        .footer {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #94a3b8;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🔍 服务状态看板</h1>
    <div class="status-grid" id="statusGrid">
        <div class="card">
            <div class="card-header"><span class="dot"></span><span class="name">加载中…</span></div>
            <div class="status-text unknown">—</div>
            <div class="time">检查时间：—</div>
        </div>
    </div>
    <div class="footer">数据每10分钟自动更新 · GitHub Actions</div>
</div>

<script>
    (async function loadStatus() {
        try {
            const res = await fetch('data/status.json');
            if (!res.ok) throw new Error('无法获取数据');
            const data = await res.json();
            renderCards(data);
        } catch (e) {
            document.getElementById('statusGrid').innerHTML =
                '<p style="color:red;">状态数据加载失败，请稍后刷新。</p>';
        }
    })();

    function getStatusInfo(code) {
        // 如果请求失败 (code 为 null 或 undefined)
        if (code == null) {
            return { dotClass: '', statusText: '未知', textClass: 'unknown' };
        }
        const codeNum = Number(code);
        if (codeNum >= 200 && codeNum < 300) {
            return { dotClass: 'online', statusText: '正常', textClass: 'normal' };
        }
        if (codeNum >= 300 && codeNum < 400) {
            return { dotClass: 'redirect', statusText: '重定向(改道)', textClass: 'warning' };
        }
        if (codeNum === 429) {
            return { dotClass: 'overload', statusText: '超载', textClass: 'error' };
        }
        // 其他 4xx/5xx 或未知错误
        return { dotClass: 'offline', statusText: `错误 ${codeNum}`, textClass: 'error' };
    }

    function renderCards(data) {
        const grid = document.getElementById('statusGrid');
        const results = data.results || [];
        const configList = data.config || [];

        // 建立 domain -> name 的映射
        const nameMap = {};
        configList.forEach(c => { nameMap[c.domain] = c.name; });

        if (!results.length) {
            grid.innerHTML = '<p>暂无监测数据。</p>';
            return;
        }

        grid.innerHTML = results.map(r => {
            const info = getStatusInfo(r.status_code);
            const displayName = nameMap[r.domain] || r.domain;
            const timeStr = r.checked_at
                ? new Date(r.checked_at).toLocaleString('zh-CN', { hour12: false })
                : '未知';

            return `
                <div class="card">
                    <div class="card-header">
                        <span class="dot ${info.dotClass}"></span>
                        <span class="name">${escapeHtml(displayName)}</span>
                    </div>
                    <div class="status-text ${info.textClass}">${escapeHtml(info.statusText)}</div>
                    <div class="time">检查时间：${escapeHtml(timeStr)}</div>
                </div>
            `;
        }).join('');
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
</script>
</body>
</html>
