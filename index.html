<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务状态</title>
    <style>
        :root {
            --card-bg: #ffffff;
            --text: #1e293b;
            --sub: #64748b;
            --border: #e2e8f0;
            --shadow: 0 1px 3px rgba(0,0,0,0.04);
            --online: #10b981;
            --redirect: #f59e0b;
            --overload: #ef4444;
            --offline: #ef4444;
            --unknown: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #f8fafc;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            padding: 2rem 1rem;
            color: var(--text);
        }

        .container { max-width: 720px; width: 100%; }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        h1 {
            font-weight: 600;
            font-size: 1.5rem;
            color: #0f172a;
            margin: 0;
        }

        .btn-refresh {
            background: none;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            transition: background 0.2s;
            background: #ffffff;
        }

        .btn-refresh:hover {
            background: #f1f5f9;
        }

        .btn-refresh svg {
            width: 1rem;
            height: 1rem;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1rem;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .card-header { display: flex; align-items: center; gap: 0.5rem; }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--unknown);
            flex-shrink: 0;
        }

        .dot.online  { background: var(--online); }
        .dot.redirect { background: var(--redirect); }
        .dot.overload { background: var(--overload); }
        .dot.offline  { background: var(--offline); }

        .name { font-weight: 500; word-break: break-word; }

        .status-text { font-size: 0.85rem; font-weight: 500; }
        .status-text.normal { color: var(--online); }
        .status-text.warning { color: var(--redirect); }
        .status-text.error { color: var(--offline); }
        .status-text.unknown { color: var(--unknown); }

        .meta {
            font-size: 0.75rem;
            color: var(--sub);
            display: flex;
            flex-direction: column;
            gap: 0.1rem;
        }

        .time { font-size: 0.75rem; color: var(--sub); margin-top: auto; }

        .footer {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #94a3b8;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🔍 服务状态看板</h1>
        <button class="btn-refresh" id="refreshBtn" title="强制刷新缓存">
            <svg viewBox="0 0 16 16" fill="currentColor">
                <path fill-rule="evenodd" d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/>
                <path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/>
            </svg>
            刷新
        </button>
    </div>
    <div class="status-grid" id="statusGrid">
        <div class="card">
            <div class="card-header"><span class="dot"></span><span class="name">加载中…</span></div>
            <div class="status-text unknown">—</div>
            <div class="meta">状态码 — | — ms</div>
            <div class="time">检查时间：—</div>
        </div>
    </div>
    <div class="footer">数据每10分钟自动更新 · GitHub Actions</div>
</div>

<script>
    async function fetchData(forceRefresh = false) {
        try {
            let url = 'data/status.json';
            if (forceRefresh) {
                // 添加时间戳避免缓存
                url += `?t=${Date.now()}`;
            }
            const res = await fetch(url);
            if (!res.ok) throw new Error('无法获取数据');
            return await res.json();
        } catch (e) {
            throw e;
        }
    }

    function getStatusInfo(code) {
        if (code == null) {
            return { dotClass: '', statusText: '未知', textClass: 'unknown' };
        }
        const codeNum = Number(code);
        if (codeNum >= 200 && codeNum < 300) {
            return { dotClass: 'online', statusText: '正常', textClass: 'normal' };
        }
        if (codeNum >= 300 && codeNum < 400) {
            return { dotClass: 'redirect', statusText: '重定向(改道)', textClass: 'warning' };
        }
        if (codeNum === 429) {
            return { dotClass: 'overload', statusText: '超载', textClass: 'error' };
        }
        return { dotClass: 'offline', statusText: `错误 ${codeNum}`, textClass: 'error' };
    }

    function renderCards(data) {
        const grid = document.getElementById('statusGrid');
        const results = data.results || [];
        const configList = data.config || [];

        // 域名 -> 名称映射
        const nameMap = {};
        configList.forEach(c => { nameMap[c.domain] = c.name; });

        if (!results.length) {
            grid.innerHTML = '<p>暂无监测数据。</p>';
            return;
        }

        grid.innerHTML = results.map(r => {
            const info = getStatusInfo(r.status_code);
            const displayName = nameMap[r.domain] || r.domain;

            // 状态码显示
            const codeDisplay = r.status_code != null ? `状态码 ${r.status_code}` : '状态码 —';

            // 响应时间，如果有 response_time_ms 字段则显示，否则显示占用位
            let timeDisplay = '— ms';
            if (r.response_time_ms != null && !isNaN(r.response_time_ms)) {
                timeDisplay = `${Math.round(r.response_time_ms)} ms`;
            }

            const checkedTime = r.checked_at
                ? new Date(r.checked_at).toLocaleString('zh-CN', { hour12: false })
                : '未知';

            return `
                <div class="card">
                    <div class="card-header">
                        <span class="dot ${info.dotClass}"></span>
                        <span class="name">${escapeHtml(displayName)}</span>
                    </div>
                    <div class="status-text ${info.textClass}">${escapeHtml(info.statusText)}</div>
                    <div class="meta">
                        <span>${escapeHtml(codeDisplay)} | ${escapeHtml(timeDisplay)}</span>
                    </div>
                    <div class="time">检查时间：${escapeHtml(checkedTime)}</div>
                </div>
            `;
        }).join('');
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // 页面加载时获取数据
    window.addEventListener('DOMContentLoaded', async () => {
        try {
            const data = await fetchData(false);
            renderCards(data);
        } catch (e) {
            document.getElementById('statusGrid').innerHTML =
                '<p style="color:red;">状态数据加载失败，请稍后刷新。</p>';
        }
    });

    // 强制刷新按钮
    document.getElementById('refreshBtn').addEventListener('click', async function() {
        const btn = this;
        btn.disabled = true;
        btn.innerHTML = `<svg viewBox="0 0 16 16" fill="currentColor" style="width:1rem;height:1rem;"><path fill-rule="evenodd" d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/><path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/></svg> 刷新中…`;
        try {
            const data = await fetchData(true);
            renderCards(data);
        } catch (e) {
            alert('刷新失败，请稍后重试');
        } finally {
            btn.disabled = false;
            btn.innerHTML = `<svg viewBox="0 0 16 16" fill="currentColor" style="width:1rem;height:1rem;"><path fill-rule="evenodd" d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/><path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/></svg> 刷新`;
        }
    });
</script>
</body>
</html>
